<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REBEL-OS 7.8 | VISTA ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.2);
            --vista-blue: linear-gradient(180deg, #1e5799 0%, #2989d8 50%, #207cca 100%);
            --win-border: rgba(0, 0, 0, 0.4);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #004040; background-size: cover; background-position: center; transition: 0.5s; }

        /* --- PANTALLA DE INICIO (DESDE CERO) --- */
        #login-screen { 
            position: fixed; width: 100%; height: 100%; z-index: 10000; 
            background: radial-gradient(circle, #2989d8, #000); display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3); text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { padding: 12px; border-radius: 5px; border: none; margin: 10px; width: 250px; outline: none; }
        .btn-vista { background: #fff; color: #000; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* --- ESCRITORIO --- */
        #desktop { display: none; width: 100%; height: calc(100% - 45px); padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; flex-wrap: wrap; gap: 20px; align-content: flex-start; }
        .icon { width: 90px; text-align: center; color: white; cursor: pointer; text-shadow: 1px 1px 3px #000; padding: 10px; border-radius: 5px; transition: 0.2s; }
        .icon:hover { background: rgba(255,255,255,0.2); }
        .icon img { width: 45px; margin-bottom: 5px; }

        /* --- VENTANAS VISTA STYLE --- */
        .window { 
            position: absolute; background: #ece9d8; border: 1px solid var(--win-border); 
            border-radius: 8px 8px 0 0; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 100; min-width: 400px; overflow: hidden;
        }
        .title-bar { 
            background: var(--vista-blue); color: white; padding: 10px 15px; font-weight: bold; 
            display: flex; justify-content: space-between; align-items: center; cursor: move;
        }
        .win-body { padding: 15px; color: #000; min-height: 200px; background: #fff; }

        /* --- TASKBAR --- */
        .taskbar { 
            position: absolute; bottom: 0; width: 100%; height: 45px; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 10px; z-index: 1000; box-sizing: border-box; 
        }
        .start-orb { 
            width: 50px; height: 50px; background: radial-gradient(circle, #52b152, #008a00); 
            border-radius: 50%; cursor: pointer; margin-bottom: 5px; border: 2px solid #fff; box-shadow: 0 0 10px #0f0;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px;
        }

        /* --- MODERACIÓN DE APPS --- */
        #mod-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; display:none; align-items:center; justify-content:center; color:white; }
        .mod-box { text-align:center; border:2px solid gold; padding:30px; border-radius:15px; }

        #clock { margin-left: auto; color: white; font-weight: bold; }
    </style>
</head>
<body onload="initOS()">

    <div id="login-screen">
        <div class="login-card">
            <h1 id="welcome-msg">BIENVENIDO AL BÚNK3R</h1>
            <p>Inicia sesión o regístrate para entrar al sistema</p>
            <input type="text" id="user-in" placeholder="Nombre del Comandante">
            <input type="password" id="pass-in" placeholder="Código de Acceso">
            <br>
            <button class="btn-vista" onclick="doLogin()">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="mod-screen">
        <div class="mod-box">
            <h2 id="mod-title">ESCANEO DE SEGURIDAD</h2>
            <div id="mod-status">Analizando integridad de la aplicación...</div>
            <div id="mod-bar" style="width:0%; height:5px; background:lime; margin-top:10px;"></div>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openW('win-store')"><img src="https://cdn-icons-png.flaticon.com/512/3382/3382703.png"><span>Rebel Store</span></div>
        <div class="icon" onclick="openW('win-browser')"><img src="https://cdn-icons-png.flaticon.com/512/841/841364.png"><span>Explorador</span></div>
        <div class="icon" onclick="openW('win-config')"><img src="https://cdn-icons-png.flaticon.com/512/3938/3938457.png"><span>Arquitecto</span></div>
        <div id="installed-apps" style="display:contents;"></div>
    </div>

    <div class="window" id="win-store">
        <div class="title-bar" onmousedown="drag(event, 'win-store')"><span>Rebel Store - Apps Moderadas</span><button class="btn-vista" onclick="closeW('win-store')">X</button></div>
        <div class="win-body">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div style="border:1px solid #ccc; padding:10px; text-align:center;">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968814.png" width="40"><br>Steam
                    <button onclick="checkApp('Steam', 'https://cdn-icons-png.flaticon.com/512/5968/5968814.png')">Instalar</button>
                </div>
                <div style="border:1px solid #ccc; padding:10px; text-align:center;">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" width="40"><br>Discord
                    <button onclick="checkApp('Discord', 'https://cdn-icons-png.flaticon.com/512/5968/5968756.png')">Instalar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="window" id="win-config">
        <div class="title-bar" onmousedown="drag(event, 'win-config')"><span>Arquitecto de Búnker</span><button class="btn-vista" onclick="closeW('win-config')">X</button></div>
        <div class="win-body">
            <b>Imagen de Fondo (URL):</b><br>
            <input type="text" id="bg-url" placeholder="Pega el link de la imagen aquí..." style="width:90%;">
            <button onclick="setWall()">Aplicar Fondo</button>
            <hr>
            <button onclick="logout()" style="background:red; color:white; padding:10px; width:100%; border:none; cursor:pointer;">CERRAR SESIÓN (LOGOUT)</button>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-orb" onclick="logout()">R</div>
        <div style="color:white; margin-left:15px; font-weight:bold;" id="os-name-tb">REBEL-OS</div>
        <div id="clock">00:00</div>
    </div>

    <script>
        function initOS() {
            let user = localStorage.getItem('loggedUser');
            if(user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'flex';
                document.body.style.backgroundImage = `url('${localStorage.getItem('wall') || 'https://images.unsplash.com/photo-1518770660439-4636190af475'}')`;
                loadApps();
            }
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
        }

        function doLogin() {
            let u = document.getElementById('user-in').value;
            if(u) {
                localStorage.setItem('loggedUser', u);
                initOS();
            }
        }

        function logout() {
            localStorage.removeItem('loggedUser');
            location.reload();
        }

        function setWall() {
            let url = document.getElementById('bg-url').value;
            localStorage.setItem('wall', url);
            document.body.style.backgroundImage = `url('${url}')`;
        }

        // --- MODERACIÓN DE APPS ---
        function checkApp(name, icon) {
            document.getElementById('mod-screen').style.display = 'flex';
            let bar = document.getElementById('mod-bar');
            let w = 0;
            let i = setInterval(() => {
                w += 5; bar.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(i);
                    installApp(name, icon);
                    document.getElementById('mod-screen').style.display = 'none';
                }
            }, 50);
        }

        function installApp(name, icon) {
            let apps = JSON.parse(localStorage.getItem('apps') || '[]');
            if(!apps.find(a => a.name === name)) {
                apps.push({name, icon});
                localStorage.setItem('apps', JSON.stringify(apps));
                loadApps();
            }
        }

        function loadApps() {
            let apps = JSON.parse(localStorage.getItem('apps') || '[]');
            let container = document.getElementById('installed-apps');
            container.innerHTML = "";
            apps.forEach(app => {
                container.innerHTML += `<div class="icon" onclick="alert('Iniciando ${app.name}...')"><img src="${app.icon}"><span>${app.name}</span></div>`;
            });
        }

        function openW(id) { document.getElementById(id).style.display = 'block'; }
        function closeW(id) { document.getElementById(id).style.display = 'none'; }

        // --- DRAG ---
        let activeW = null, offset = [0,0];
        function drag(e, id) {
            activeW = document.getElementById(id);
            offset = [activeW.offsetLeft - e.clientX, activeW.offsetTop - e.clientY];
            document.onmousemove = (ev) => {
                activeW.style.left = (ev.clientX + offset[0]) + 'px';
                activeW.style.top = (ev.clientY + offset[1]) + 'px';
            };
            document.onmouseup = () => { document.onmousemove = null; };
        }
    </script>
</body>
</html>
